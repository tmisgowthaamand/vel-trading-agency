<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <style>
        .gallery { display: flex; flex-wrap: wrap; gap: 10px; }
        .item { border: 1px solid #ccc; padding: 10px; text-align: center; }
        img { max-width: 200px; max-height: 200px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1>Product Images</h1>
    <div class="gallery" id="gallery"></div>
    <script>
        const images = [
            "WhatsApp Image 2026-06-09 at 3.38.41 PM (1).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.41 PM (2).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.41 PM.jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.42 PM (1).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.42 PM (2).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.42 PM.jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.43 PM (1).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.43 PM (2).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.43 PM.jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.44 PM (1).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.44 PM (2).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.44 PM.jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.45 PM (1).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.45 PM (2).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.45 PM.jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.46 PM (1).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.46 PM (2).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.46 PM (3).jpeg",
            "WhatsApp Image 2026-06-09 at 3.38.46 PM.jpeg"
        ];
        const gallery = document.getElementById('gallery');
        images.forEach(img => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<img src="products/${img}" alt="${img}"><div>${img}</div>`;
            gallery.appendChild(div);
        });
    </script>
</body>
</html>
